name: Build IPA for verification (unsigned)

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: "Configuración Xcode"
        required: true
        type: choice
        options:
          - Release
          - Debug
        default: Release
      retention_days:
        description: "Días de retención del artefacto IPA"
        required: true
        type: number
        default: 14
  push:
    branches:
      - main
      - feature/planificaciones-unidades
      - codex/**
      - preview-planificaciones

jobs:
  unsigned-ipa:
    name: Build unsigned IPA for sideloading
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: read
    concurrency:
      group: unsigned-ipa-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    env:
      PROJECT_PATH: EduPanel.xcodeproj
      SCHEME: EduPanel
      CONFIGURATION: ${{ inputs.configuration || 'Release' }}
      DERIVED_DATA_PATH: build/DerivedData
      APP_PATH: build/DerivedData/Build/Products/${{ inputs.configuration || 'Release' }}-iphoneos/EduPanel.app
      IPA_PATH: build/unsigned/EduPanel-unsigned.ipa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Restore Firebase iOS config
        env:
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
            echo "Falta el secreto GOOGLE_SERVICE_INFO_PLIST_BASE64."
            exit 1
          fi
          mkdir -p EduPanel/Resources
          ruby -rbase64 -e 'File.binwrite("EduPanel/Resources/GoogleService-Info.plist", Base64.decode64(ENV.fetch("GOOGLE_SERVICE_INFO_PLIST_BASE64")))'

      - name: Resolve Swift packages
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -resolvePackageDependencies

      - name: Build app without signing
        env:
          EDUPANEL_API_BASE_URL: ${{ secrets.EDUPANEL_API_BASE_URL }}
          GOOGLE_REVERSED_CLIENT_ID: ${{ secrets.GOOGLE_REVERSED_CLIENT_ID }}
        run: |
          set -o pipefail
          if [ -z "$EDUPANEL_API_BASE_URL" ]; then
            echo "Falta el secreto EDUPANEL_API_BASE_URL."
            exit 1
          fi
          if [ -z "$GOOGLE_REVERSED_CLIENT_ID" ]; then
            echo "Falta el secreto GOOGLE_REVERSED_CLIENT_ID."
            exit 1
          fi

          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            clean build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EDUPANEL_API_BASE_URL="$EDUPANEL_API_BASE_URL" \
            GOOGLE_REVERSED_CLIENT_ID="$GOOGLE_REVERSED_CLIENT_ID" \
            2>&1 | tee build-xcode.log

      - name: Print build errors
        if: failure()
        run: |
          if [ -f build-xcode.log ]; then
            echo "=== XCODEBUILD LOG TAIL ==="
            tail -n 300 build-xcode.log
          else
            echo "No build-xcode.log found."
          fi

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-xcode-log
          path: build-xcode.log

      - name: Verify app executable metadata
        run: |
          test -d "$APP_PATH"
          EXECUTABLE_NAME=$(/usr/libexec/PlistBuddy -c "Print CFBundleExecutable" "$APP_PATH/Info.plist" 2>/dev/null || true)
          if [ -z "$EXECUTABLE_NAME" ]; then
            EXECUTABLE_NAME="EduPanel"
            /usr/libexec/PlistBuddy -c "Add :CFBundleExecutable string $EXECUTABLE_NAME" "$APP_PATH/Info.plist"
            echo "Repaired missing CFBundleExecutable in app Info.plist"
          fi
          test -n "$EXECUTABLE_NAME"
          test -f "$APP_PATH/$EXECUTABLE_NAME"
          echo "Verified executable: $APP_PATH/$EXECUTABLE_NAME"

      - name: Package unsigned IPA
        run: |
          test -d "$APP_PATH"
          mkdir -p build/unsigned/Payload
          cp -R "$APP_PATH" build/unsigned/Payload/
          cd build/unsigned
          zip -qry EduPanel-unsigned.ipa Payload

      - name: Verify IPA and write checksum
        run: |
          test -s "$IPA_PATH"
          unzip -t "$IPA_PATH"
          shasum -a 256 "$IPA_PATH" | tee "$IPA_PATH.sha256"
          echo "IPA generada: $IPA_PATH"
          echo "SHA-256: $(cut -d ' ' -f 1 "$IPA_PATH.sha256")"

      - name: Publish build summary
        if: success()
        run: |
          {
            echo "## IPA de verificación lista"
            echo ""
            echo "- Archivo: `EduPanel-unsigned.ipa`"
            echo "- Configuración: `$CONFIGURATION`"
            echo "- SHA-256: `$(cut -d ' ' -f 1 "$IPA_PATH.sha256")`"
            echo ""
            echo "Es una IPA sin firma: sirve para inspección y sideloading con una herramienta compatible, no para instalarla directamente desde Xcode/App Store."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: EduPanel-unsigned-ipa
          path: |
            ${{ env.IPA_PATH }}
            ${{ env.IPA_PATH }}.sha256
          retention-days: ${{ inputs.retention_days || 14 }}
          if-no-files-found: error
