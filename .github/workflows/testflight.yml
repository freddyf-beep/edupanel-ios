name: Build iOS and Upload to TestFlight

on:
  workflow_dispatch:
    inputs:
      changelog:
        description: "Notas visibles para este build de TestFlight"
        required: false
        default: "Build automatizado de EduPanel."

jobs:
  testflight:
    name: Archive, export, upload
    runs-on: macos-15
    timeout-minutes: 60

    env:
      PROJECT_PATH: EduPanel.xcodeproj
      SCHEME: EduPanel
      CONFIGURATION: Release
      BUNDLE_ID: cl.edupanel.app
      ARCHIVE_PATH: build/EduPanel.xcarchive
      EXPORT_PATH: build/export
      IPA_PATH: build/export/EduPanel.ipa
      TESTFLIGHT_CHANGELOG: ${{ inputs.changelog }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Setup Ruby and Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Restore Firebase iOS config
        env:
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          test -n "$GOOGLE_SERVICE_INFO_PLIST_BASE64"
          mkdir -p EduPanel/Resources
          ruby -rbase64 -e 'File.binwrite("EduPanel/Resources/GoogleService-Info.plist", Base64.decode64(ENV.fetch("GOOGLE_SERVICE_INFO_PLIST_BASE64")))'

      - name: Install Apple signing assets
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          test -n "$IOS_DISTRIBUTION_CERTIFICATE_BASE64"
          test -n "$IOS_PROVISIONING_PROFILE_BASE64"
          test -n "$KEYCHAIN_PASSWORD"

          CERTIFICATE_PATH="$RUNNER_TEMP/distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          ruby -rbase64 -e 'File.binwrite(ARGV[0], Base64.decode64(ENV.fetch(ARGV[1])))' "$CERTIFICATE_PATH" IOS_DISTRIBUTION_CERTIFICATE_BASE64
          ruby -rbase64 -e 'File.binwrite(ARGV[0], Base64.decode64(ENV.fetch(ARGV[1])))' "$PROFILE_PATH" IOS_PROVISIONING_PROFILE_BASE64

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_UUID="$(security cms -D -i "$PROFILE_PATH" | /usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin)"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -resolvePackageDependencies

      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          EDUPANEL_API_BASE_URL: ${{ secrets.EDUPANEL_API_BASE_URL }}
          GOOGLE_REVERSED_CLIENT_ID: ${{ secrets.GOOGLE_REVERSED_CLIENT_ID }}
        run: |
          test -n "$APPLE_TEAM_ID"
          test -n "$IOS_PROVISIONING_PROFILE_NAME"
          test -n "$EDUPANEL_API_BASE_URL"
          test -n "$GOOGLE_REVERSED_CLIENT_ID"

          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            clean archive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISIONING_PROFILE_NAME" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            EDUPANEL_API_BASE_URL="$EDUPANEL_API_BASE_URL" \
            GOOGLE_REVERSED_CLIENT_ID="$GOOGLE_REVERSED_CLIENT_ID"

      - name: Verify archived app executable metadata
        run: |
          APP_PATH="$ARCHIVE_PATH/Products/Applications/EduPanel.app"
          test -d "$APP_PATH"
          EXECUTABLE_NAME=$(/usr/libexec/PlistBuddy -c "Print CFBundleExecutable" "$APP_PATH/Info.plist" 2>/dev/null || true)
          if [ -z "$EXECUTABLE_NAME" ]; then
            EXECUTABLE_NAME="EduPanel"
            /usr/libexec/PlistBuddy -c "Add :CFBundleExecutable string $EXECUTABLE_NAME" "$APP_PATH/Info.plist"
            echo "Repaired missing CFBundleExecutable in archived app Info.plist"
          fi
          test -n "$EXECUTABLE_NAME"
          test -f "$APP_PATH/$EXECUTABLE_NAME"
          echo "Verified executable: $APP_PATH/$EXECUTABLE_NAME"

      - name: Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          mkdir -p build
          cat > build/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>cl.edupanel.app</key>
              <string>$IOS_PROVISIONING_PROFILE_NAME</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
          </dict>
          </plist>
          PLIST

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          test -f "$IPA_PATH"
          bundle exec fastlane ios upload_testflight

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: EduPanel-ipa
          path: build/export/*.ipa
          if-no-files-found: ignore
